<!DOCTYPE html>
<html class="light" lang="en" th:fragment="parent(content,title,script)"
	xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link
	href="https://cdn.jsdelivr.net/npm/flowbite@3.1.1/dist/flowbite.min.css"
	rel="stylesheet" />
<link rel="stylesheet" data-th-href="@{'/css/output.css'}" />
<link rel="stylesheet" data-th-href="@{'/css/style.css'}" />
<title th:replace="${title}">Base Page</title>

<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
	integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
	crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="dark:bg-gray-900 dark:text-white">
	<!--Common Header -->

	<div th:if="${loginUser}">
		<div th:replace="~{user/user_navbar::user-navbar}"></div>
	</div>

	<div th:unless="${loginUser}">
		<div th:replace="~{navbar :: navbar}"></div>
	</div>
	
	
	<!-- Main section -->
	<div class="p-4">
		<section th:replace="${content}"></section>
	</div>

	<!-- 
		<footer class="p-4">Code with Swarup</footer> -->

	<script
		src="https://cdn.jsdelivr.net/npm/flowbite@3.1.1/dist/flowbite.min.js"></script>

	<script data-th-src="@{/js/script.js}"></script>

	<th:block th:replace="${script}"></th:block>

</body>
</html>
